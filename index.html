<!-- Document viewer (CV + Cover Letter) -->
<div class="doc-viewer" id="docViewer" aria-hidden="true">
  <div class="doc-viewer__backdrop" data-doc-viewer-backdrop></div>

  <div class="doc-viewer__panel" role="dialog" aria-modal="true" aria-label="Document viewer">
    <a class="doc-viewer__download" href="#" download data-doc-viewer-download aria-label="Download document">
      ↓
    </a>

    <div class="doc-viewer__pdf-scroll" data-doc-viewer-scroll></div>
    <iframe
      class="doc-viewer__pdf-iframe"
      data-doc-viewer-iframe
      src=""
      title="Document preview"
    ></iframe>

    <!-- Zoom slider bar -->
    <div class="doc-viewer__toolbar">
      <button class="doc-viewer__zoom-btn" data-zoom-out type="button" aria-label="Zoom out">−</button>
      <input
        class="doc-viewer__zoom-slider"
        type="range"
        min="50"
        max="250"
        value="100"
        step="5"
        data-zoom-slider
        aria-label="Zoom level"
      />
      <button class="doc-viewer__zoom-btn" data-zoom-in type="button" aria-label="Zoom in">+</button>
      <span class="doc-viewer__zoom-label" data-zoom-label>100%</span>
    </div>
  </div>
</div>

<script src="pdf.min.js"></script>
<script>
  if (window.pdfjsLib) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.min.js';
  }
</script>
<script>
  // Fallback: if local PDF.js failed, try CDN
  if (!window.pdfjsLib) {
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = function() {
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    };
    document.head.appendChild(s);
  }
</script>
